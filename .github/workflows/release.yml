name: Release Agent

# 打 tag（v 开头）时触发，自动交叉编译多平台 agent 二进制并发布到 Release。
# 也支持手动触发（workflow_dispatch）。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 取完整历史，保证 git describe --tags 可用

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Resolve version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build all platforms
        working-directory: agent
        run: make all VERSION=${{ steps.ver.outputs.version }}

      - name: List artifacts
        run: ls -lh agent/bin

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            agent/bin/monitor-agent-linux-amd64
            agent/bin/monitor-agent-linux-arm64
            agent/bin/monitor-agent-darwin-amd64
            agent/bin/monitor-agent-darwin-arm64
            agent/bin/monitor-agent-windows-amd64.exe
